name: lingowave
description: "LingoWave - Hindi se English seekho. Learn English from Hindi."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.3 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # ── UI & Fonts ────────────────────────────────────────────
  cupertino_icons: ^1.0.8
  google_fonts: ^6.2.1

  # ── State Management ──────────────────────────────────────
  flutter_riverpod: ^2.4.9
  provider: ^6.1.1

  # ── Navigation ────────────────────────────────────────────
  go_router: ^13.2.0

  # ── Local Storage ─────────────────────────────────────────
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  shared_preferences: ^2.2.3

  # ── Networking ────────────────────────────────────────────
  dio: ^5.4.1

  # ── Auth ──────────────────────────────────────────────────
  google_sign_in: ^6.2.1

  # ── Firebase ──────────────────────────────────────────────
  firebase_core: ^2.27.0
  firebase_messaging: ^14.7.9

  # ── Audio & Speech ────────────────────────────────────────
  flutter_tts: ^3.8.5
  speech_to_text: ^6.6.0
  audioplayers: ^6.0.0

  # ── Animations ────────────────────────────────────────────
  lottie: ^3.1.0
  confetti: ^0.7.0

  # ── Charts & Progress ─────────────────────────────────────
  fl_chart: ^0.67.0

  # ── Ads ───────────────────────────────────────────────────
  google_mobile_ads: ^4.0.0  

  # ── Subscriptions ─────────────────────────────────────────
  purchases_flutter: ^6.13.0

  # ── Images ────────────────────────────────────────────────
  cached_network_image: ^3.3.1

  # ── Notifications ─────────────────────────────────────────
  flutter_local_notifications: ^17.1.2

  # ── Utilities ─────────────────────────────────────────────
  intl: ^0.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  hive_generator: ^2.0.1
  build_runner: ^2.4.8

flutter:
  uses-material-design: true

  fonts:
    - family: Poppins
      fonts:
        - asset: assets/fonts/Poppins-Light.ttf
          weight: 300
        - asset: assets/fonts/Poppins-Regular.ttf
          weight: 400
        - asset: assets/fonts/Poppins-Medium.ttf
          weight: 500
        - asset: assets/fonts/Poppins-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Poppins-Bold.ttf
          weight: 700
        - asset: assets/fonts/Poppins-ExtraBold.ttf
          weight: 800
    - family: Nunito
      fonts:
        - asset: assets/fonts/Nunito-Regular.ttf
          weight: 400
        - asset: assets/fonts/Nunito-Medium.ttf
          weight: 500
        - asset: assets/fonts/Nunito-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Nunito-Bold.ttf
          weight: 700
        - asset: assets/fonts/Nunito-ExtraBold.ttf
          weight: 800
        - asset: assets/fonts/Nunito-Black.ttf
          weight: 900

  assets:
    - assets/images/
    - assets/fonts/
    - assets/animations/
    - assets/audio/
    - assets/data/